openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PriceCheck NG API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: vendors
    description: Vendor operations
  - name: prices
    description: Price comparison operations
  - name: categories
    description: Category operations
  - name: alerts
    description: Price alert operations
  - name: deals
    description: Deals and trending operations
  - name: reviews
    description: Vendor review operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional search and category filter
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/trending:
    get:
      operationId: getTrendingProducts
      tags: [products]
      summary: Get trending products with their average prices
      responses:
        "200":
          description: Trending products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingProduct"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors with optional location filter
      parameters:
        - name: location
          in: query
          schema:
            type: string
        - name: verified
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Register a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorInput"
      responses:
        "201":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get vendor by ID with ratings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor with rating info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorDetail"
        "404":
          description: Not found
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorUpdateInput"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}/reviews:
    get:
      operationId: listVendorReviews
      tags: [reviews]
      summary: List reviews for a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorReview"
    post:
      operationId: createVendorReview
      tags: [reviews]
      summary: Submit a review for a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorReview"

  /vendors/{id}/products:
    get:
      operationId: getVendorProducts
      tags: [vendors]
      summary: Get all products and prices for a vendor (vendor dashboard)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor product listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorProductListing"

  /prices:
    get:
      operationId: listPrices
      tags: [prices]
      summary: Compare prices for a product across vendors
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: integer
        - name: location
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [low_to_high, high_to_low, nearest, recently_updated, best_rated]
      responses:
        "200":
          description: Price comparison results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceEntry"
    post:
      operationId: submitPrice
      tags: [prices]
      summary: Submit a price for a product at a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceInput"
      responses:
        "201":
          description: Price submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceEntry"

  /prices/{id}:
    patch:
      operationId: updatePrice
      tags: [prices]
      summary: Update a price listing (vendor dashboard)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceUpdateInput"
      responses:
        "200":
          description: Updated price entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceEntry"

  /price-history:
    get:
      operationId: getPriceHistory
      tags: [prices]
      summary: Get 30-day price history for a product
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: integer
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryPoint"

  /price-summary:
    get:
      operationId: getPriceSummary
      tags: [prices]
      summary: Get price summary stats for a product (avg, min, max, trend)
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: integer
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Price summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceSummary"

  /best-deal:
    get:
      operationId: getBestDeal
      tags: [deals]
      summary: Get best deal options for a product (cheapest, closest, best-rated)
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: integer
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Best deal options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BestDeal"

  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: Get current best deals (cheapest vendors per category)
      parameters:
        - name: category_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Current deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (optionally filter by vendor)
      parameters:
        - name: vendor_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (vendor confirms/rejects)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List price alerts for the user
      responses:
        "200":
          description: List of price alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a price drop alert for a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceAlertInput"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"

  /alerts/{id}:
    delete:
      operationId: deleteAlert
      tags: [alerts]
      summary: Delete a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Alert deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      required: [id, name, icon, color]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        product_count:
          type: ["integer", "null"]

    Product:
      type: object
      required: [id, name, category_id, unit]
      properties:
        id:
          type: integer
        name:
          type: string
        category_id:
          type: integer
        category_name:
          type: ["string", "null"]
        unit:
          type: string
        description:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        average_price:
          type: ["number", "null"]
        min_price:
          type: ["number", "null"]
        vendor_count:
          type: ["integer", "null"]

    ProductInput:
      type: object
      required: [name, category_id, unit]
      properties:
        name:
          type: string
        category_id:
          type: integer
        unit:
          type: string
        description:
          type: string
        image_url:
          type: string

    TrendingProduct:
      type: object
      required: [id, name, unit, average_price, price_change_pct]
      properties:
        id:
          type: integer
        name:
          type: string
        category_name:
          type: string
        unit:
          type: string
        image_url:
          type: ["string", "null"]
        average_price:
          type: number
        min_price:
          type: number
        price_change_pct:
          type: number
        vendor_count:
          type: integer

    Vendor:
      type: object
      required: [id, name, location]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        address:
          type: ["string", "null"]
        logo_url:
          type: ["string", "null"]
        verified:
          type: boolean
        whatsapp:
          type: ["string", "null"]
        stock_available:
          type: boolean
        delivery_options:
          type: ["string", "null"]
        response_time:
          type: ["string", "null"]
        price_count:
          type: ["integer", "null"]
        average_rating:
          type: ["number", "null"]
        rating_count:
          type: ["integer", "null"]

    VendorDetail:
      type: object
      required: [id, name, location]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        address:
          type: ["string", "null"]
        logo_url:
          type: ["string", "null"]
        verified:
          type: boolean
        whatsapp:
          type: ["string", "null"]
        stock_available:
          type: boolean
        delivery_options:
          type: ["string", "null"]
        response_time:
          type: ["string", "null"]
        price_count:
          type: ["integer", "null"]
        average_rating:
          type: ["number", "null"]
        rating_count:
          type: ["integer", "null"]
        recent_reviews:
          type: array
          items:
            $ref: "#/components/schemas/VendorReview"

    VendorInput:
      type: object
      required: [name, location]
      properties:
        name:
          type: string
        location:
          type: string
        address:
          type: string
        logo_url:
          type: string
        whatsapp:
          type: string
        delivery_options:
          type: string
        response_time:
          type: string

    VendorUpdateInput:
      type: object
      properties:
        stock_available:
          type: boolean
        delivery_options:
          type: string
        response_time:
          type: string
        whatsapp:
          type: string
        address:
          type: string

    VendorProductListing:
      type: object
      required: [price_id, product_id, product_name, unit, price, quantity, updated_at]
      properties:
        price_id:
          type: integer
        product_id:
          type: integer
        product_name:
          type: string
        category_name:
          type: ["string", "null"]
        unit:
          type: string
        price:
          type: number
        quantity:
          type: string
        updated_at:
          type: string
        stock_available:
          type: boolean

    VendorReview:
      type: object
      required: [id, vendor_id, rating, reviewer_name, created_at]
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
        rating:
          type: integer
        reviewer_name:
          type: string
        comment:
          type: ["string", "null"]
        created_at:
          type: string

    VendorReviewInput:
      type: object
      required: [rating, reviewer_name]
      properties:
        rating:
          type: integer
        reviewer_name:
          type: string
        comment:
          type: string

    PriceEntry:
      type: object
      required: [id, product_id, vendor_id, price, quantity, updated_at]
      properties:
        id:
          type: integer
        product_id:
          type: integer
        vendor_id:
          type: integer
        vendor_name:
          type: string
        vendor_location:
          type: string
        vendor_logo_url:
          type: ["string", "null"]
        vendor_verified:
          type: boolean
        vendor_whatsapp:
          type: ["string", "null"]
        vendor_rating:
          type: ["number", "null"]
        vendor_rating_count:
          type: ["integer", "null"]
        vendor_stock_available:
          type: boolean
        vendor_delivery_options:
          type: ["string", "null"]
        vendor_response_time:
          type: ["string", "null"]
        price:
          type: number
        quantity:
          type: string
        is_cheapest:
          type: boolean
        is_best_rated:
          type: boolean
        updated_at:
          type: string

    PriceInput:
      type: object
      required: [product_id, vendor_id, price, quantity]
      properties:
        product_id:
          type: integer
        vendor_id:
          type: integer
        price:
          type: number
        quantity:
          type: string

    PriceUpdateInput:
      type: object
      properties:
        price:
          type: number
        quantity:
          type: string
        stock_available:
          type: boolean

    PriceHistoryPoint:
      type: object
      required: [date, average_price, min_price]
      properties:
        date:
          type: string
        average_price:
          type: number
        min_price:
          type: number

    PriceSummary:
      type: object
      required: [product_id, average_price, min_price, max_price, price_change_pct, vendor_count]
      properties:
        product_id:
          type: integer
        average_price:
          type: number
        min_price:
          type: number
        max_price:
          type: number
        price_change_pct:
          type: number
        vendor_count:
          type: integer
        cheapest_vendor:
          type: ["string", "null"]

    BestDealOption:
      type: object
      required: [label, vendor_id, vendor_name, vendor_location, price, quantity, vendor_whatsapp]
      properties:
        label:
          type: string
        vendor_id:
          type: integer
        vendor_name:
          type: string
        vendor_location:
          type: string
        vendor_logo_url:
          type: ["string", "null"]
        vendor_verified:
          type: boolean
        vendor_whatsapp:
          type: ["string", "null"]
        vendor_rating:
          type: ["number", "null"]
        vendor_stock_available:
          type: boolean
        price:
          type: number
        quantity:
          type: string
        badge:
          type: string

    BestDeal:
      type: object
      required: [product_id, options]
      properties:
        product_id:
          type: integer
        options:
          type: array
          items:
            $ref: "#/components/schemas/BestDealOption"

    Deal:
      type: object
      required: [product_id, product_name, vendor_name, price, unit, original_avg_price]
      properties:
        product_id:
          type: integer
        product_name:
          type: string
        category_name:
          type: string
        vendor_id:
          type: integer
        vendor_name:
          type: string
        vendor_location:
          type: string
        vendor_verified:
          type: boolean
        vendor_whatsapp:
          type: ["string", "null"]
        vendor_rating:
          type: ["number", "null"]
        price:
          type: number
        unit:
          type: string
        original_avg_price:
          type: number
        discount_pct:
          type: number
        image_url:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, product_id, vendor_id, quantity, buyer_name, status, created_at]
      properties:
        id:
          type: integer
        product_id:
          type: integer
        vendor_id:
          type: integer
        product_name:
          type: ["string", "null"]
        vendor_name:
          type: ["string", "null"]
        vendor_whatsapp:
          type: ["string", "null"]
        quantity:
          type: integer
        buyer_name:
          type: string
        buyer_phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: string
        price_at_order:
          type: ["number", "null"]
        created_at:
          type: string

    OrderInput:
      type: object
      required: [product_id, vendor_id, quantity, buyer_name]
      properties:
        product_id:
          type: integer
        vendor_id:
          type: integer
        quantity:
          type: integer
        buyer_name:
          type: string
        buyer_phone:
          type: string
        notes:
          type: string
        price_at_order:
          type: number

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    PriceAlert:
      type: object
      required: [id, product_id, target_price, email, created_at]
      properties:
        id:
          type: integer
        product_id:
          type: integer
        product_name:
          type: ["string", "null"]
        target_price:
          type: number
        email:
          type: string
        location:
          type: ["string", "null"]
        created_at:
          type: string

    PriceAlertInput:
      type: object
      required: [product_id, target_price, email]
      properties:
        product_id:
          type: integer
        target_price:
          type: number
        email:
          type: string
        location:
          type: string
